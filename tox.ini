[tox]
requires =
    tox>=4.2
    tox-uv>=1.33
env_list =
    lint
    format

[testenv:lint]
description = Run ruff linter
skip_install = true
commands =
    ruff check src/ {posargs}
dependency_groups =
    dev

[testenv:format]
description = Check ruff formatting
skip_install = true
commands =
    ruff format --check src/ {posargs}
dependency_groups =
    dev

[testenv:pex]
description = Build a single-file PEX executable of the MCP server
skip_install = true
commands =
    uv build --wheel --out-dir {env_tmp_dir}/dist
    sh -c 'pex {env_tmp_dir}/dist/*.whl --entry-point tplink_sg1016_mcp.__main__:mcp.run --output dist/tplink-sg1016-mcp.pex --python-shebang "/usr/bin/env python3" {posargs}'
allowlist_externals =
    sh
dependency_groups =
    dev
